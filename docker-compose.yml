services:
    office_agent_postgres:
        image: postgres:16
        container_name: office_agent_postgres
        restart: always
        env_file:
            - .env
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        ports:
            - '127.0.0.1:${DB_PORT}:5432'
        volumes:
            - office_agent_postgres_data:/var/lib/postgresql/data
        networks:
            - office_agent_network
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    office_agent_postgres_data:

networks:
    office_agent_network:
        driver: bridge
